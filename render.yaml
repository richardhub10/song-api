services:
  - type: web
    name: song-api
    env: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
        # Render often has no IPv6 egress. Supabase direct DB host (db.<ref>.supabase.co) can be IPv6-only.
        # Use Supabase "Connection pooling / Pooler" host here for IPv4 connectivity.
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      # Supabase requires SSL. This suffix is appended to the JDBC URL constructed in application.properties.
      # Example: ?sslmode=require
      - key: DB_PARAMS
        value: ?sslmode=require
